site_name: Mirror Machine
site_description: Theoretical Mirror Framework – self-referential loops, consciousness phase transitions and Mirror Principle simulation
site_author: GenesisAeon
repo_url: https://github.com/GenesisAeon/mirror-machine
repo_name: GenesisAeon/mirror-machine

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.annotate
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: .

nav:
  - Home: index.md
  - API Reference: api.md
  - CLI Reference: cli.md
  - Changelog: changelog.md
